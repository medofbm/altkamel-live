# ════════════════════════════════════════════════════
# nginx.conf — منصة البث المباشر — شبكة التكامل نت
# ════════════════════════════════════════════════════
# الاستخدام: ضع هذا الملف في /etc/nginx/conf.d/altkamel-live.conf
# بعد توليد الموقع: npm run generate
# انسخ مجلد .output/public إلى المسار المحدد في root

server {
    listen       80;
    listen       [::]:80;
    server_name  live.altkamel.ly;   # غيّر هذا لاسم نطاقك

    # مجلد الملفات الثابتة (ناتج nuxt generate)
    root         /home/abdullah/iptv-streaming-engine/frontend/dist;
    index        index.html;

    # ─── ضغط gzip ───
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json
        application/xml+rss image/svg+xml;

    # ─── API PHP ───
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
    }

    # ─── SPA Fallback: كل المسارات ترجع index.html ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── ملفات ثابتة: كاش طويل ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── CORS لبث HLS الداخلي ───
    location ~* \.m3u8$ {
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Cache-Control               "no-cache, no-store";
        proxy_pass http://172.16.6.102;
    }

    # ─── أمان أساسي ───
    add_header X-Frame-Options      "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection     "1; mode=block" always;

    # ─── إخفاء رقم إصدار Nginx ───
    server_tokens off;
}
